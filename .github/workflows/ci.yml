name: CI

on:
  push:
    branches:
    - main
  pull_request:
    branches:
    - main

jobs:
  build-apple:
    name: Build and Test (macOS)
    runs-on: macos-latest
    permissions:
      contents: read
    steps:
    - uses: actions/checkout@v4
    - name: Print Xcode & Swift Version
      run: |
        xcodebuild -version
        swift --version
    - name: Build & Test
      run: swift test -v --enable-code-coverage --xunit-output .build/test-results.xml
    - name: Resolve SwiftPM coverage report path
      id: coverage
      run: |
        # SwiftPM writes coverage JSON to a generated path. Resolve it and pass it to Codecov explicitly.
        coverage_path="$(swift test --skip-build --show-codecov-path --enable-code-coverage | tail -n 1)"
        test -f "$coverage_path"
        echo "path=$coverage_path" >> "$GITHUB_OUTPUT"
    - name: Upload coverage reports to Codecov
      uses: codecov/codecov-action@v5
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        files: ${{ steps.coverage.outputs.path }}
    - name: Upload test results to Codecov
      if: ${{ !cancelled() }}
      uses: codecov/codecov-action@v5
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        files: .build/test-results.xml
        report_type: test_results
  build-linux:
    name: Build and Test (Linux) - Swift ${{ matrix.swift }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        swift: ["5.10", "6.0", "6.1", "6.2"]
    steps:
    - uses: vapor/swiftly-action@v0.2
      with:
        toolchain: ${{ matrix.swift }}
    - uses: actions/checkout@v4
    - name: Test
      run: swift test -v
  build-android:
    name: Build and Test (Android) - Swift 6.1
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
    - uses: actions/checkout@v4
    - name: Free disk space
      uses: jlumbroso/free-disk-space@main
      with:
        tool-cache: false
        android: false
        dotnet: true
        haskell: true
        large-packages: true
        docker-images: true
        swap-storage: true
    - uses: skiptools/swift-android-action@v2
      with:
        swift-version: 6.1
